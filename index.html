<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARDA Dashboard</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* Full-screen and flex centering */
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  width: 100%;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  background: black;
  font-family: 'JetBrains Mono', monospace;
}

.container {
  z-index: 10;
  text-align: center;
}

/* Button styling */
.start-btn {
  cursor: pointer;
  background-color: black;
  border: 2px solid white;
  color: white;
  padding: 14px 28px;
  font-size: 18px;
  transition: all 0.3s ease;
  margin-top: 20px;
}

.start-btn:hover {
  box-shadow: 0 0 25px white;
}

/* Optional title/subtitle styles */
.title {
  font-size: 42px;
  color: white;
  margin: 0;
  letter-spacing: 2px;
}

.subtitle {
  font-size: 20px;
  color: white;
  margin: 10px 0 20px;
  letter-spacing: 1.5px;
}
</style>
</head>

<body>

<!-- Particle background -->
<div id="particles" style="position: fixed; top:0; left:0; width:100%; height:100%; z-index:1;"></div>

<!-- Main container -->
<div class="container">

<h1 class="title">ARDA DASHBOARD</h1>
<p class="subtitle">Department of the Navy</p>

<p style="font-size:20px; letter-spacing:2px; margin-top:20px;">
ADVANCED RESEARCH & DEVELOPMENT ADMINISTRATION
</p>

<button class="start-btn" onclick="window.location.href='puzzle1.html'">
LAUNCH
</button>

</div>

<!-- Global scripts -->
<script src="https://cdn.jsdelivr.net/npm/tsparticles@2.11.0/tsparticles.bundle.min.js"></script>
<script src="script.js"></script>

</body>
</html>
