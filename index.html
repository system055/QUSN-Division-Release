<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scavenger Hunt</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* Ensure the button container is above particles */
.container {
  position: relative;
  z-index: 10;
  text-align: center;
  top: 30%;
}

/* Button styling (optional, already in style.css) */
.start-btn {
  cursor: pointer;
  background-color: black;
  border: 2px solid white;
  color: white;
  padding: 14px 28px;
  font-size: 18px;
  transition: all 0.3s ease;
}

.start-btn:hover {
  box-shadow: 0 0 25px white;
}
</style>
</head>

<body>

<!-- Particle background -->
<div id="particles" style="position: fixed; top:0; left:0; width:100%; height:100%; z-index:1;"></div>

<!-- Main container -->
<div class="container">
<h1 class="title">WELCOME AGENT</h1>
<p class="subtitle">Your mission begins now</p>
<button class="start-btn" onclick="window.location.href='puzzle1.html'">
INITIALIZE PROTOCOL
</button>
</div>

<!-- Global scripts -->
<script src="https://cdn.jsdelivr.net/npm/tsparticles@2.11.0/tsparticles.bundle.min.js"></script>
<script src="script.js"></script>

</body>
</html>
