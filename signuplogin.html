<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ARDA Access Terminal</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>

html, body{
margin:0;
padding:0;
height:100%;
background:black;
font-family:'JetBrains Mono', monospace;
display:flex;
align-items:center;
justify-content:center;
color:white;
overflow:hidden;
}

#particles{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:1;
}

.container{
z-index:10;
width:360px;
text-align:center;
}

.auth-box{
border:2px solid white;
padding:30px;
background:black;
}

.title{
font-size:26px;
letter-spacing:2px;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
background:black;
border:2px solid white;
color:white;
font-family:'JetBrains Mono', monospace;
outline:none;
}

.password-row{
display:flex;
gap:6px;
}

.password-row input{
flex:1;
}

.toggle-pass{
border:2px solid white;
background:black;
color:white;
padding:12px;
cursor:pointer;
}

.toggle-pass:hover{
box-shadow:0 0 10px white;
}

.start-btn{
margin-top:18px;
width:100%;
padding:14px;
border:2px solid white;
background:black;
color:white;
font-size:16px;
cursor:pointer;
}

.start-btn:hover{
box-shadow:0 0 25px white;
}

.remember{
margin-top:10px;
font-size:14px;
}

.switch{
margin-top:15px;
font-size:14px;
}

.switch button{
background:none;
border:none;
color:white;
cursor:pointer;
text-decoration:underline;
}

.status{
margin-top:12px;
font-size:14px;
min-height:18px;
}

</style>

</head>

<body>

<div id="particles"></div>

<div class="container">

<div class="auth-box">

<div class="title" id="modeTitle">CREATE ACCOUNT</div>

<form id="authForm">

<input
id="username"
type="text"
placeholder="Username"
autocomplete="username"
required
>

<div class="password-row">

<input
id="password"
type="password"
placeholder="Password"
autocomplete="current-password"
required
>

<button type="button" class="toggle-pass" onclick="togglePassword()">
SHOW
</button>

</div>

<div class="remember">
<label>
<input type="checkbox" id="remember">
Remember Me
</label>
</div>

<button class="start-btn" type="submit" id="submitBtn">
CREATE ACCOUNT
</button>

</form>

<div class="switch">

<span id="switchText">Already have an account?</span>

<button onclick="toggleMode()">Login</button>

</div>

<div class="status" id="status"></div>

</div>

</div>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const SUPABASE_URL = "https://psiqmduohdryllkkqucb.supabase.co"

const SUPABASE_KEY =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBzaXFtZHVvaGRyeWxsa2txdWNiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NzgzOTEsImV4cCI6MjA5MDE1NDM5MX0.CpPpFPwnAlFnzk43dCzRoJWWRWMQpQPpPkQ7giTyIfg"

const supabaseClient = supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
)

let loginMode = false



function togglePassword(){

const pass = document.getElementById("password")

if(pass.type === "password"){
pass.type = "text"
}else{
pass.type = "password"
}

}



function toggleMode(){

loginMode = !loginMode

if(loginMode){

document.getElementById("modeTitle").innerText = "LOGIN"

document.getElementById("submitBtn").innerText = "LOGIN"

document.getElementById("switchText").innerText = "Need an account?"

}else{

document.getElementById("modeTitle").innerText = "CREATE ACCOUNT"

document.getElementById("submitBtn").innerText = "CREATE ACCOUNT"

document.getElementById("switchText").innerText = "Already have an account?"

}

}



document
.getElementById("authForm")
.addEventListener("submit", async function(e){

e.preventDefault()

const username =
document.getElementById("username").value

const password =
document.getElementById("password").value

const email =
username.toLowerCase() + "@arda.local"

const status =
document.getElementById("status")

status.innerText = "Processing..."

try{

let result

if(loginMode){

result =
await supabaseClient.auth.signInWithPassword({
email:email,
password:password
})

}else{

result =
await supabaseClient.auth.signUp({
email:email,
password:password
})

}

if(result.error){

status.innerText = result.error.message
return

}

status.innerText = "Access granted"

setTimeout(() => {

window.location.href = "home.html"

},800)

}catch(err){

status.innerText = "Authentication failed"

}

})

</script>

<!-- particles -->
<script src="https://cdn.jsdelivr.net/npm/tsparticles@2.11.0/tsparticles.bundle.min.js"></script>
<script src="script.js"></script>

</body>
</html>
