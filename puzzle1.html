<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Puzzle 01</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

</head>

<body>

<div id="particles"></div>

<div class="container">

<h1 class="title">PUZZLE 01</h1>

<p class="subtitle">SOLVE THE EQUATION</p>

<p style="font-size:28px; margin-top:30px; letter-spacing:2px;">
(7² × 3) − 20 = ?
</p>

<input
id="answerBox"
type="text"
placeholder="ENTER ANSWER"
style="
margin-top:40px;
padding:14px;
font-size:16px;
background:black;
border:2px solid white;
color:white;
text-align:center;
width:220px;
outline:none;
"
/>

<br><br>

<button class="start-btn" onclick="checkAnswer()">
SUBMIT
</button>

</div>

<script>

function checkAnswer(){

let answer = document.getElementById("answerBox").value;

if(answer === "127"){

alert("ACCESS GRANTED");

window.location.href = "puzzle2.html";

}
else{

alert("INCORRECT ANSWER");

}

}

</script>

<script src="https://cdn.jsdelivr.net/npm/tsparticles@2.11.0/tsparticles.bundle.min.js"></script>
